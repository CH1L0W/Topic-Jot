<div class="flex flex-col items-center">
    <app-search-bar class="w-1/3 bg-toolbar-bg"></app-search-bar>
</div>

<div class="filters">
    <button class="filter-button" [class.active-button]="filter() === filtersList.all"
        (click)="setTopicsFilter(filtersList.all)">
        <lucide-icon name="layout-grid" size="20"></lucide-icon>
        All
    </button>
    <button class="filter-button" [class.active-button]="filter() === filtersList.favorites"
        (click)="setTopicsFilter(filtersList.favorites)">
        <lucide-icon name="star" size="20"></lucide-icon>
        Favorites
    </button>
    <button class="filter-button" [class.active-button]="filter() === filtersList.recent"
        (click)="setTopicsFilter(filtersList.recent)">
        <lucide-icon name="clock" size="20"></lucide-icon>
        Recent
    </button>
    <button class="filter-button" [class.active-button]="filter() === filtersList.archived"
        (click)="setTopicsFilter(filtersList.archived)">
        <lucide-icon name="archive" size="20"></lucide-icon>
        Archived
    </button>
</div>

<div class="flex flex-col gap-4">
    <div class="flex flex-wrap justify-center gap-4">

        @for (item of topics(); track $index) {
        <app-topic-card [topic]="item" (click)="searchNotes(item.id!)">
        </app-topic-card>
        }

        <app-topic-card (click)="dialogState.openTopicDialog()">
            <div class="flex flex-col gap-2">
                <div class="flex items-center justify-center rounded-full w-12 h-12 mx-auto">
                    <lucide-icon name="plus" />
                </div>
                <h1 class="text-center">Add Topic</h1>
                <span class="text-center">Start a new topic and jot down your ideas.</span>
            </div>
        </app-topic-card>
    </div>
</div>
