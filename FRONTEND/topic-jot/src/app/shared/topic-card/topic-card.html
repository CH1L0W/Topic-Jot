@if (title) {
<div class="flex flex-col gap-1 justify-between h-full">
  <div class="flex flex-1 flex-row gap-1">
    <div class="h-20 w-20 m-1" [style.background-color]="color">
      
    </div>
    
    <div>
      <h3>{{ title }}</h3>
      <p>{{ description }}</p>
    </div>

    <button class="absolute top-2 right-1">
      <lucide-icon name="ellipsis-vertical" />
    </button>
  </div>

  <div class="mt-auto">
    <ng-content select="[footer]"></ng-content>
  </div>
</div>
}

<ng-content></ng-content>
