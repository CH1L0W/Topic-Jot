<div class="toolbar">
    <div class="flex flex-row items-center gap-2">
        <app-search-bar></app-search-bar>
        <span>|</span>
        <div class="filters">
            <lucide-icon name="funnel" size="20"></lucide-icon>
            <span>Filters</span>
            <lucide-icon name="chevron-down" size="20"></lucide-icon>
        </div>
    </div>

    <div class="flex flex-row items-center gap-2">
        <span># Notes</span>
        <span>|</span>
        <div class="options">
            <lucide-icon name="ellipsis-vertical" size="20"></lucide-icon>
        </div>
    </div>
</div>

<div class="flex flex-col gap-4">
    @for (item of notes(); track $index) {
    <app-note-card class="relative" title="{{item.title}}">
        <button class="absolute top-2 right-1.5 text-xl">
            <lucide-icon name="ellipsis-vertical" />
        </button>
        <p class="text-justify">
            {{item.content}}
        </p>
        <div footer class="flex justify-between items-center">
            <div class="flex gap-4">
                <div class="flex items-center gap-1"><lucide-icon name="clock" size="20" /> {{item.updatedAt}}</div>
            </div>
            <button>
                <lucide-icon name="bookmark" size="20" />
            </button>
        </div>
    </app-note-card>
    }
</div>
