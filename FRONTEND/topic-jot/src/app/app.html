<div class="flex flex-col gap-4">
    <div class="relative">
        @if (view() === 'Notes') {
        <button class="back-button" (click)="view.set('Topics')">
            <i class="!flex items-center justify-center border rounded-full w-8 h-8 pi pi-arrow-left"></i>
            <span class="text-xl">Go Back</span>
        </button>
        }
        <h1 class="text-4xl font-bold text-center">Topic Jot</h1>
    </div>
    <app-search-bar></app-search-bar>
    @switch (view()) {
    @case('Topics'){
    <app-topics (topicSelected)="showNotes()"></app-topics>
    }
    @case('Notes'){
    <app-notes></app-notes>
    }
    }
</div>

<router-outlet />
