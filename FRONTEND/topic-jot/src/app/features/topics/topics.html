<div class="flex flex-col gap-4">
    <div class="flex flex-wrap justify-center gap-4">
        @for (item of items; track $index) {
        <app-topic-card class="cursor-pointer" title="Sample Title" description="Sample Description"
            (click)="topicSelected.emit()"></app-topic-card>
        }

        <app-topic-card class="cursor-pointer">
            <div class="flex flex-col gap-4" (click)="addTopicClick()">
                <h1 class="text-center">Add Topic</h1>
                <div class="flex items-center justify-center">
                    <i class="pi pi-plus"></i>
                </div>
            </div>
        </app-topic-card>
    </div>
</div>
