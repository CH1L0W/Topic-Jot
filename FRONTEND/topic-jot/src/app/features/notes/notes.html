<div class="toolbar">
    <div class="flex flex-row items-center gap-2">
        <app-search-bar></app-search-bar>

        <span>|</span>

        <div class="relative filters" appClickOutside (appClickOutside)="hideFilters.set(true)">
            <button class="flex items-center gap-1" (click)="toggleFilters()">
                <lucide-icon name="funnel" size="20"></lucide-icon>
                <span>Filters</span>
                <lucide-icon name="chevron-down" size="20"></lucide-icon>
            </button>

            <div class="dropdown-arrow top-9 right-0" [hidden]="hideFilters()">
                <ul>
                    <li (click)="toggleFilter('favorite', !filters()['favorite']); $event.stopPropagation()">
                        <input type="checkbox" class="mr-2" [(ngModel)]="filters()['favorite']" />
                        Favorite
                    </li>

                    <li (click)="toggleFilter('erased', !filters()['erased']); $event.stopPropagation()">
                        <input type="checkbox" class="mr-2" [(ngModel)]="filters()['erased']" />
                        Erased
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <div class="flex flex-row items-center gap-2">
        <span># Notes</span>
        <span>|</span>
        <div class="relative options" appClickOutside (appClickOutside)="hideOptions.set(true)">
            <button (click)="toggleOptions()">
                <lucide-icon name="ellipsis-vertical" size="20"></lucide-icon>
            </button>

            <div class="dropdown-arrow top-9 -right-1" [hidden]="hideOptions()" (click)="$event.stopPropagation()">
                <ul>
                    <li>Add Note</li>
                </ul>
            </div>
        </div>
    </div>
</div>

<div class="flex flex-col gap-4">
    @for (note of notes(); track $index) {
    <app-note-card class="relative" title="{{note.title}}">
        <div appClickOutside (appClickOutside)="hideNoteOptions.set(true)" class="absolute top-2 right-1.5 ">
            <button class="text-xl" (click)="toggleNoteOptions()">
                <lucide-icon name="ellipsis-vertical" />
            </button>
            <div class="dropdown-arrow top-8 -right-1" [hidden]="hideNoteOptions()" (click)="$event.stopPropagation()">
                <ul>
                    <li>Add Note</li>
                </ul>
            </div>
        </div>

        <p class="text-justify">
            {{note.content}}
        </p>

        <div footer class="flex justify-between items-center">
            <div class="flex gap-4">
                <div class="flex items-center gap-1"><lucide-icon name="clock" size="20" /> {{note.updatedAt}}</div>
            </div>

            <button>
                <lucide-icon name="bookmark" size="20" [class]="note.favorite ? 'fill-current' : ''"
                    (click)="toggleFavorite(note.id!); $event.stopPropagation()" />
            </button>
        </div>
    </app-note-card>
    }
</div>
