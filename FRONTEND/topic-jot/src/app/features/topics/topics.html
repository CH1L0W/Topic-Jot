<div class="flex flex-col items-center">
    <app-search-bar class="w-1/3 bg-[#FCFAF7]"></app-search-bar>
</div>

<div class="filters">
    <button class="filter-button" (click)="setTopicsFilter('All')">
        <lucide-icon name="layout-grid" size="20"></lucide-icon>
        All
    </button>
    <button class="filter-button" (click)="setTopicsFilter('Favorites')">
        <lucide-icon name="star" size="20"></lucide-icon>
        Favorites
    </button>
    <button class="filter-button" (click)="setTopicsFilter('Recent')">
        <lucide-icon name="clock" size="20"></lucide-icon>
        Recent
    </button>
    <button class="filter-button" (click)="setTopicsFilter('Archived')">
        <lucide-icon name="archive" size="20"></lucide-icon>
        Archived
    </button>
</div>

<div class="flex flex-col gap-4">
    <div class="flex flex-wrap justify-center gap-4">
        @for (item of items; track $index) {
        <app-topic-card title="Sample Title" description="Sample Description" (click)="topicSelected.emit()">
            <div footer class="flex justify-between items-center">
                <div class="flex gap-2">
                    <div class="flex items-center gap-1"><lucide-icon name="notepad-text" size="20" /> 18 notes</div>
                    <span>•</span>
                    <div class="flex items-center gap-1"><lucide-icon name="clock" size="20" /> 2 days ago</div>
                </div>
                <lucide-icon name="star" size="20" />
            </div>
        </app-topic-card>
        }

        <app-topic-card (click)="addTopic.emit()">
            <div class="flex flex-col gap-2">
                <div class="flex items-center justify-center rounded-full w-12 h-12 mx-auto">
                    <lucide-icon name="plus" />
                </div>
                <h1 class="text-center">Add Topic</h1>
                <span class="text-center">Start a new topic and jot down your ideas.</span>
            </div>
        </app-topic-card>
    </div>
</div>
